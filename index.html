<style>
:root {
  --navy:#005E9E;--teal:#0083C4;--teal-lt:#E6F3FA;
  --amber:#f59e0b;--red:#dc2626;--red-lt:#fef2f2;
  --muted:#94a3b8;--border:rgba(0,0,0,.09);--card:#fff;
  --bg:#f8fafc;--lt:#f1f5f9;--text:#1e293b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--navy);position:sticky;top:0;z-index:100}
.hdr-gold-bar{height:5px;background:#E5A810}
.hdr-inner{padding:16px 24px 16px}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.hdr-brand{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:3px}
.hdr-title{font-size:20px;font-weight:700;color:#fff}
.hdr-meta{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.back-btn{font-size:13px;color:rgba(255,255,255,.7);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;cursor:pointer;display:none}
.back-btn.visible{display:inline-flex;align-items:center;gap:5px}
.section-title-hdr{font-size:14px;font-weight:600;color:rgba(255,255,255,.55);margin-top:4px;display:none}
.section-title-hdr.visible{display:block}

/* ── HOME SCREEN ── */
.home-screen{max-width:900px;margin:0 auto;padding:20px 16px}
.home-grid{display:grid;grid-template-columns:1fr;gap:10px}@media(min-width:540px){.home-grid{grid-template-columns:1fr 1fr}}
.home-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:border-color .15s;display:flex;flex-direction:row;align-items:center;gap:12px}
.home-card:hover{border-color:#E5A810}
.home-card:active{background:var(--lt)}
.home-card-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.home-card-icon svg{display:block}
.home-card-name{font-size:15px;font-weight:600;color:var(--navy)}
.home-card-sub{font-size:12px;color:var(--muted);line-height:1.4;margin-top:2px}
.home-card-arrow{font-size:18px;color:#E5A810;margin-left:auto;flex-shrink:0}

/* ── DETAIL SCREEN ── */
.detail-screen{display:none;max-width:900px;margin:0 auto;padding:24px}
.detail-screen.active{display:block}

/* ── SHARED COMPONENTS ── */
.section{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.section-title{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.loading{color:var(--muted);font-size:14px;padding:48px 0;text-align:center}
.error-box{background:#fef2f2;border:0.5px solid #fecaca;border-radius:8px;padding:14px;color:#991b1b;font-size:13px;margin-bottom:16px}
.no-data{font-size:13px;color:var(--muted);font-style:italic;padding:8px 0}

/* ── DRILLS ── */
.drill-campus-label{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:14px;margin-top:24px}
.drill-type-label{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin:12px 0 6px}
.month-row{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:4px}
.month-cell{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;min-width:28px}
.month-lbl{font-size:9px;color:var(--muted)}
.dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.dot-ok{background:var(--teal);color:#fff}.dot-slow{background:var(--amber);color:#fff}
.dot-none{background:var(--red-lt);color:var(--red)}.dot-future{background:var(--lt);color:var(--muted)}
.last-drill-card{background:var(--lt);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.stat-line{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:0.5px solid var(--border)}
.stat-line:last-child{border-bottom:none}
.stat-key{color:var(--muted)}.stat-val{color:var(--navy);font-weight:500;max-width:60%;text-align:right}
.stat-val.ok{color:var(--teal)}.stat-val.warn{color:var(--amber)}.stat-val.flag{color:var(--red)}

/* ── ARRIVAL ── */
.session-hdr{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin:0 0 10px}
.session-hdr.arr{color:#085041}.session-hdr.dis{color:#1e40af}
.r-table{width:100%;border-collapse:collapse;margin-bottom:6px}
.r-table thead th{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:0 0 6px;border-bottom:0.5px solid var(--border)}
.r-table tbody td{padding:7px 0;border-bottom:0.5px solid rgba(0,0,0,.05);vertical-align:middle}
.r-table tbody tr:last-child td{border-bottom:none}
.bar-track{height:7px;background:var(--lt);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.n-lbl{font-size:10px;margin-top:6px;margin-bottom:10px}
.flags-title{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
.flag-item{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,.05)}
.flag-item:last-child{border-bottom:none}
.flag-name{color:var(--navy);flex:1;padding-right:10px}
.flag-pct{color:var(--red);font-weight:500}
.cluster-block{margin-bottom:24px}
.cluster-label{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:14px;margin-top:24px}

/* ── CUSTODIAL ── */
.sparkline{display:flex;align-items:flex-end;gap:3px;height:44px;margin:10px 0 2px}
.spark-bar{flex:1;border-radius:2px 2px 0 0;min-height:4px}
.spark-good{background:var(--teal)}.spark-mid{background:var(--amber)}.spark-low{background:var(--red)}.spark-null{background:var(--border)}
.pct-big{font-size:28px;font-weight:700}
.improve-item{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12px}
.improve-item:last-child{border-bottom:none}
.improve-name{color:var(--navy);flex:1;padding-right:10px;font-weight:500}
.improve-right{text-align:right;flex-shrink:0}
.flag-rate-val{font-size:14px;font-weight:700;color:var(--red)}
.prior-rate-val{font-size:10px;color:var(--muted);display:block}
.badge-focus{background:var(--red-lt);color:#991b1b;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;margin-left:6px}
.badge-improving{background:var(--teal-lt);color:#005E9E;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;margin-left:6px}
.badge-stable{background:var(--lt);color:var(--muted);font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;margin-left:6px}

/* ── TRANSPORTATION ── */
.metric-table{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:0 8px}
.metric-lbl{font-size:11px;color:var(--muted);line-height:1.35;align-self:end;padding-bottom:5px}
.metric-val-t{font-size:20px;font-weight:700;color:var(--navy);align-self:start}
.route-header{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px}
.route-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.metric-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.metric-card{background:var(--lt);border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.metric-val{font-size:22px;font-weight:700;color:var(--navy)}
.leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.leg-block{background:var(--lt);border-radius:10px;padding:14px}
.leg-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.leg-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.leg-stat-label{font-size:10px;color:var(--muted);margin-bottom:3px}
.leg-stat-val{font-size:16px;font-weight:700;color:var(--navy)}
.chart-wrap{position:relative;width:100%;height:200px;margin-bottom:4px}
.chart-legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-bottom:14px}
.chart-swatch{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.issue-table{width:100%;border-collapse:collapse;font-size:13px}
.issue-table th{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);text-align:left;padding:0 0 8px;border-bottom:0.5px solid var(--border)}
.issue-table td{padding:8px 0;border-bottom:0.5px solid var(--border);vertical-align:top}
.issue-table tr:last-child td{border-bottom:none}
.td-trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px;color:var(--muted)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600}
.badge-warn{background:#fef9c3;color:#92400e}
.badge-danger{background:var(--red-lt);color:#991b1b}
.badge-accent{background:var(--teal-lt);color:var(--navy)}
.badge-gray{background:var(--lt);color:var(--muted)}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="hdr">
  <div class="hdr-gold-bar"></div>
  <div class="hdr-inner">
    <div class="hdr-top">
      <div>
        <div class="hdr-brand">DC Prep</div>
        <div class="hdr-title">Ops Dashboard</div>
      </div>
      <button class="back-btn" id="back-btn" onclick="goHome()">← Back</button>
    </div>
    <div class="section-title-hdr" id="section-title-hdr"></div>
    <div class="hdr-meta" id="hdr-meta"></div>
  </div>
</div>

<!-- ── HOME ── -->
<div class="home-screen" id="screen-home">
  <div id="home-loading" class="loading">Loading dashboard data…</div>
  <div class="home-grid" id="home-grid" style="display:none">

    <div class="home-card" onclick="showSection('arrival')">
      <div class="home-card-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v5"/>
          <circle cx="16" cy="17" r="2"/><circle cx="7" cy="17" r="2"/>
          <path d="M5 17H3m14 0h2m-4 0H9"/>
        </svg>
      </div>
      <div>
        <div class="home-card-name">Arrival &amp; Dismissal</div>
        <div class="home-card-sub" id="sub-arrival">Loading…</div>
      </div>
      <div class="home-card-arrow">›</div>
    </div>

    <div class="home-card" onclick="showSection('custodial')">
      <div class="home-card-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 10m0 2a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2z"/>
          <path d="M6 10v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4"/>
          <path d="M15 7h.01"/><path d="M18 9h.01"/><path d="M18 5h.01"/>
          <path d="M21 3h.01"/><path d="M21 7h.01"/><path d="M21 11h.01"/>
          <path d="M10 7h1"/>
        </svg>
      </div>
      <div>
        <div class="home-card-name">Custodial</div>
        <div class="home-card-sub" id="sub-custodial">Loading…</div>
      </div>
      <div class="home-card-arrow">›</div>
    </div>

    <div class="home-card" onclick="showSection('drills')">
      <div class="home-card-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div>
        <div class="home-card-name">Drills</div>
        <div class="home-card-sub" id="sub-drills">Loading…</div>
      </div>
      <div class="home-card-arrow">›</div>
    </div>

    <div class="home-card" onclick="showSection('transport')">
      <div class="home-card-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#E5A810" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 17a2 2 0 1 0 4 0a2 2 0 1 0-4 0"/>
          <path d="M16 17a2 2 0 1 0 4 0a2 2 0 1 0-4 0"/>
          <path d="M4 17h-2v-11a1 1 0 0 1 1-1h14a5 7 0 0 1 5 7v5h-2m-4 0h-8"/>
          <path d="M16 5l1.5 7h4.5"/>
          <line x1="2" y1="10" x2="17" y2="10"/>
          <line x1="7" y1="5" x2="7" y2="10"/>
          <line x1="12" y1="5" x2="12" y2="10"/>
        </svg>
      </div>
      <div>
        <div class="home-card-name">Transportation Pilot</div>
        <div class="home-card-sub" id="sub-transport">Loading…</div>
      </div>
      <div class="home-card-arrow">›</div>
    </div>

  </div>
  <div id="home-error" style="display:none"></div>
</div>

<!-- ── DETAIL SCREENS ── -->
<div class="detail-screen" id="screen-arrival"></div>
<div class="detail-screen" id="screen-custodial"></div>
<div class="detail-screen" id="screen-drills"></div>
<div class="detail-screen" id="screen-transport"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPbhFWpzKX6S6seb1c0QKplVM22LjZG6bkGMBnTNopry6dDr5YGtffKKR3EsFQ77n5BQ/exec';

const SECTION_NAMES = {
  arrival: 'Arrival & Dismissal',
  custodial: 'Custodial',
  drills: 'Drills',
  transport: 'Transportation Pilot',
};

const AD_FLAG_LABELS = {
  'Crossing guard present': 'Crossing guard coverage',
  'Arrival / dismissal zones free of obstructions': 'Keeping arrival/dismissal zones clear',
  'No unauthorized vehicles in student loading zones': 'Unauthorized vehicles in loading zones',
  'All staff members at duty posts': 'Staff coverage at duty posts',
  'Staff members attentive — not on phones': 'Staff attentiveness during transitions',
  'Staff behaviors support positive student behaviors and transitions': 'Staff behaviors during transitions',
  'Staff positioned to maximize visibility of students': 'Staff positioning for visibility',
  'Students moving with purpose, minimal crowding': 'Student movement and crowding',
  'Drop-off / pick-up line moving efficiently': 'Drop-off / pick-up line efficiency',
  'Students needing support identified and assisted promptly': 'Identifying students who need support',
};

let OPS = null, TRANSPORT = null, WIN = 14;

// ── NAV ───────────────────────────────────────────────────────────────────────
function showSection(name) {
  document.getElementById('screen-home').style.display = 'none';
  document.querySelectorAll('.detail-screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const el = document.getElementById('screen-' + name);
  if (el) { el.classList.add('active'); el.style.display = ''; }
  document.getElementById('back-btn').classList.add('visible');
  const th = document.getElementById('section-title-hdr');
  th.textContent = SECTION_NAMES[name] || '';
  th.classList.add('visible');
  window.scrollTo(0, 0);
  render(name);
}

function goHome() {
  document.querySelectorAll('.detail-screen').forEach(s => {
    s.classList.remove('active'); s.style.display = 'none';
  });
  document.getElementById('screen-home').style.display = '';
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('section-title-hdr').classList.remove('visible');
  window.scrollTo(0, 0);
}

function render(name) {
  if (!OPS) return;
  if (name === 'arrival')   renderArrival();
  if (name === 'custodial') renderCustodial();
  if (name === 'drills')    renderDrills();
  if (name === 'transport') renderTransport();
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [ops, transport] = await Promise.all([
      fetch(SCRIPT_URL + '?view=ops').then(r => r.json()),
      fetch(SCRIPT_URL + '?view=transport').then(r => r.json()).catch(() => null),
    ]);
    OPS = ops; TRANSPORT = transport; WIN = ops.window || 14;
    document.getElementById('home-loading').style.display = 'none';
    document.getElementById('home-grid').style.display = '';
    document.getElementById('hdr-meta').textContent = ops.generated || '';
    buildSubtitles();
  } catch(err) {
    document.getElementById('home-loading').style.display = 'none';
    const eb = document.getElementById('home-error');
    eb.style.display = '';
    eb.innerHTML = '<div class="error-box"><strong>Could not load data.</strong><br>' + err.message + '</div>';
  }
}

function buildSubtitles() {
  // Arrival
  const arrCluster = (OPS.arrival || [])[0];
  const arrN = (arrCluster?.arrival?.current?.n || 0) + (arrCluster?.dismissal?.current?.n || 0);
  document.getElementById('sub-arrival').textContent = arrN + ' obs in last ' + WIN + ' days';

  // Custodial
  const custCluster = (OPS.custodial || [])[0];
  const pct = custCluster?.currentPct;
  document.getElementById('sub-custodial').textContent = pct !== null && pct !== undefined ? pct + '% items checked this period' : 'No walkthroughs logged';

  // Drills
  const lastDrillDates = (OPS.drills?.lastDrills || []).flatMap(d => [d.evac?.date, d.lock?.date]).filter(Boolean);
  document.getElementById('sub-drills').textContent = lastDrillDates.length ? 'Last drill: ' + lastDrillDates[0] : 'No drills logged yet';

  // Transport
  if (TRANSPORT?.routes?.length) {
    const r = TRANSPORT.routes[0];
    document.getElementById('sub-transport').textContent = r.daysLogged + '% days logged · ' + r.handoffsConfirmed + '% handoffs confirmed';
  } else {
    document.getElementById('sub-transport').textContent = 'No trip data yet';
  }
}

// ── RENDER DRILLS ─────────────────────────────────────────────────────────────
function renderDrills() {
  const con = document.getElementById('screen-drills');
  const months = OPS.drills?.months || [];
  const syStart = OPS.drills?.syStart || new Date().getFullYear();
  const today = new Date();

  function dots(statuses) {
    return months.map((m, mi) => {
      const yr = m.num >= 8 ? syStart : syStart + 1;
      const past = new Date(yr, m.num - 1, 1) < today;
      const st = statuses?.[mi] || 'none';
      const cls = !past ? 'dot-future' : st === 'ok' ? 'dot-ok' : st === 'slow' ? 'dot-slow' : 'dot-none';
      const sym = !past ? '' : (st === 'ok' || st === 'slow') ? '✓' : '!';
      return `<div class="month-cell"><div class="month-lbl">${m.label}</div><div class="dot ${cls}">${sym}</div></div>`;
    }).join('');
  }

  const CAMPUSES = ['AEC','AMC','BEC','BMC','EEC','EMC'];
  let html = '';

  CAMPUSES.forEach(campus => {
    const comp = (OPS.drills?.compliance || []).find(d => d.campus === campus);
    const last = (OPS.drills?.lastDrills  || []).find(d => d.campus === campus);

    html += `<div style="font-size:18px;font-weight:700;color:var(--navy);margin:24px 0 14px">${campus}</div>`;
    html += `<div class="section"><div class="drill-type-label">Evacuation</div>
      <div class="month-row">${dots(comp?.evac)}</div>
      <div class="drill-type-label" style="margin-top:14px">Lockdown</div>
      <div class="month-row">${dots(comp?.lock)}</div>
    </div>`;

    html += `<div class="section"><div class="section-title">Most recent drills</div>`;
    ['evac','lock'].forEach(type => {
      const drill = last?.[type];
      const label = type === 'evac' ? 'Evacuation' : 'Lockdown';
      html += `<div class="last-drill-card" style="margin-bottom:10px">
        <div style="font-size:12px;font-weight:600;color:var(--navy);margin-bottom:8px">${label}</div>`;
      if (!drill) {
        html += `<div class="no-data">No drill logged yet</div>`;
      } else {
        const dc = drill.under10 ? 'ok' : 'warn';
        const flagLines = drill.flags ? drill.flags.split(';').map(f=>f.trim()).filter(Boolean) : [];
        html += `<div class="stat-line"><span class="stat-key">Date</span><span class="stat-val">${drill.date}</span></div>`;
        html += `<div class="stat-line"><span class="stat-key">Duration</span><span class="stat-val ${dc}">${drill.duration}${drill.under10?' ✓':' — over goal'}</span></div>`;
        if (flagLines.length) {
          html += `<div class="stat-line" style="align-items:flex-start"><span class="stat-key">Improvement opportunities</span><span class="stat-val flag" style="display:flex;flex-direction:column;gap:3px">${flagLines.map(f=>`<span>${f}</span>`).join('')}</span></div>`;
        } else {
          html += `<div class="stat-line"><span class="stat-key">Improvement opportunities</span><span class="stat-val ok">None flagged</span></div>`;
        }
      }
      html += `</div>`;
    });
    html += `</div>`;
  });

  con.innerHTML = html;
}

// ── RENDER ARRIVAL ────────────────────────────────────────────────────────────
const RATINGS = [
  {label:'Strong',    key:'strong',   color:'#1d9e75'},
  {label:'OK',        key:'ok',       color:'#2a78d6'},
  {label:'Needs work',key:'needsWork',color:'#e24b4a'},
];

function ratingTable(curr, prior) {
  let t = `<table class="r-table"><thead><tr>
    <th style="text-align:left;width:80px"></th><th style="text-align:left"></th>
    <th style="text-align:right;width:36px;font-size:9px;color:var(--muted)">Last</th>
    <th style="width:8px"></th>
    <th style="text-align:right;width:36px;font-size:9px;color:var(--muted)">Prior</th>
    <th style="text-align:right;width:32px;font-size:9px;color:var(--muted)">Δ</th>
  </tr></thead><tbody>`;
  RATINGS.forEach((r, ri) => {
    const cp = curr[r.key] || 0, pp = prior ? (prior[r.key] || 0) : null;
    const d = pp !== null ? cp - pp : null;
    const ds = d === null ? '—' : d > 0 ? '+' + d : d < 0 ? '−' + Math.abs(d) : '0';
    const dc = d === null || d === 0 ? 'var(--muted)' : r.key === 'needsWork' ? (d > 0 ? 'var(--red)' : '#0f6e56') : (d > 0 ? '#0f6e56' : 'var(--red)');
    t += `<tr><td style="font-size:12px;padding:7px 10px 7px 0;vertical-align:middle">${r.label}</td>
      <td style="padding:7px 10px 7px 0;vertical-align:middle"><div class="bar-track"><div class="bar-fill" style="width:${cp}%;background:${r.color}"></div></div></td>
      <td style="font-size:12px;font-weight:500;color:var(--navy);text-align:right;vertical-align:middle">${cp}%</td>
      <td style="font-size:11px;color:var(--border);text-align:center;padding:0 2px;vertical-align:middle">·</td>
      <td style="font-size:11px;color:var(--muted);text-align:right;vertical-align:middle">${pp !== null ? pp + '%' : '—'}</td>
      <td style="font-size:11px;text-align:right;vertical-align:middle;color:${dc}">${ds}</td>
    </tr>`;
  });
  return t + '</tbody></table>';
}

function renderArrival() {
  const con = document.getElementById('screen-arrival');
  let html = '';
  (OPS.arrival || []).forEach(cl => {
    html += `<div style="font-size:18px;font-weight:700;color:var(--navy);margin:24px 0 14px">${cl.cluster}</div>`;
    html += `<div class="section">`;
    ['arrival','dismissal'].forEach(session => {
      const sData = cl[session], curr = sData?.current, prior = sData?.prior;
      const label = session === 'arrival' ? 'Arrival' : 'Dismissal';
      const hcls  = session === 'arrival' ? 'arr' : 'dis';
      html += `<div style="margin-bottom:16px"><div class="session-hdr ${hcls}">${label}</div>`;
      if (!curr || curr.n === 0) {
        html += `<div class="no-data">No ${label.toLowerCase()} observations in the last ${WIN} days.</div>`;
      } else {
        const low = curr.n < 5;
        html += ratingTable(curr, prior);
        html += `<div class="n-lbl" style="color:${low?'#b45309':'var(--muted)'}">n = ${curr.n} (last ${WIN} days)${prior?' · n = '+prior.n+' (prior)':''}${low?' ⚠ low volume':''}</div>`;
        if (sData.flags?.length) {
          html += `<div class="flags-title">Improvement opportunities</div>`;
          sData.flags.forEach(f => {
            html += `<div class="flag-item"><span class="flag-name">${AD_FLAG_LABELS[f.item]||f.item}</span><span class="flag-pct">${f.rate}%</span></div>`;
          });
        }
      }
      html += `</div>`;
    });
    html += `</div>`;
  });
  con.innerHTML = html || '<div class="section"><div class="no-data">No data available.</div></div>';
}

// ── RENDER CUSTODIAL ──────────────────────────────────────────────────────────
function renderCustodial() {
  const con = document.getElementById('screen-custodial');
  let html = '';
  (OPS.custodial || []).forEach(cl => {
    const pct = cl.currentPct, prev = cl.priorPct;
    const cw = cl.window || WIN;
    const pc = pct === null ? 'var(--muted)' : pct >= 80 ? 'var(--teal)' : pct >= 65 ? 'var(--amber)' : 'var(--red)';
    html += `<div style="font-size:18px;font-weight:700;color:var(--navy);margin:24px 0 14px">${cl.cluster}</div>`;
    html += `<div class="section">`;
    html += `<div class="pct-big" style="color:${pc}">${pct !== null ? pct + '%' : '—'}</div>`;
    html += `<div style="font-size:11px;color:var(--muted);margin-top:4px">${cl.n > 0 ? 'Based on ' + cl.n + ' walkthrough' + (cl.n>1?'s':'') + ' in last ' + cw + ' days' : 'No walkthroughs in this period'}</div>`;
    if (prev !== null && pct !== null) {
      const d = pct - prev, a = d >= 3 ? '↑' : d <= -3 ? '↓' : '→', ac = d >= 3 ? 'var(--teal)' : d <= -3 ? 'var(--amber)' : 'var(--muted)';
      html += `<div style="font-size:12px;color:var(--muted);margin-top:4px">${a} from <span style="color:${ac}">${prev}%</span> prior period</div>`;
    }
    const sparks = (cl.trend||[]).map(m => {
      if (m.pct === null) return `<div class="spark-bar spark-null" style="height:20%"></div>`;
      const cls = m.pct >= 80 ? 'spark-good' : m.pct >= 65 ? 'spark-mid' : 'spark-low';
      return `<div class="spark-bar ${cls}" style="height:${Math.max(20,m.pct)}%" title="${m.label}: ${m.pct}%"></div>`;
    }).join('');
    const lbls = (cl.trend||[]).map(m=>`<span style="font-size:9px;color:var(--muted);flex:1;text-align:center">${m.label}</span>`).join('');
    html += `<div class="sparkline" style="margin-top:14px">${sparks}</div><div style="display:flex;gap:3px;margin-bottom:14px">${lbls}</div>`;
    if (cl.flags?.length) {
      html += `<div class="flags-title" style="margin-bottom:10px">Where we can improve</div>`;
      cl.flags.forEach(f => {
        const item = f.item.includes(' — ') ? f.item.split(' — ')[1] : f.item;
        const space = f.item.includes(' — ') ? f.item.split(' — ')[0] : '';
        const bc = f.trend==='focus'?'badge-focus':f.trend==='improving'?'badge-improving':'badge-stable';
        const bl = f.trend==='focus'?'Focus area':f.trend==='improving'?'Improving':'Stable';
        html += `<div class="improve-item"><div style="flex:1"><span class="improve-name">${item}</span>${space?`<span style="font-size:10px;color:var(--muted);display:block;margin-top:1px">${space}</span>`:''}<span class="${bc}">${bl}</span></div><div class="improve-right"><span class="flag-rate-val">${f.curr}%</span><span class="prior-rate-val">${f.prior}% prior</span></div></div>`;
      });
    }
    if (cl.notes?.length) {
      html += `<div class="flags-title" style="margin-top:14px;margin-bottom:8px">Walkthrough notes</div>`;
      cl.notes.forEach(n => { html += `<div style="font-size:12px;padding:6px 0;border-bottom:0.5px solid var(--border)">${n.note}</div>`; });
    }
    html += `</div>`;
  });
  con.innerHTML = html || '<div class="section"><div class="no-data">No data available.</div></div>';
}

// ── RENDER TRANSPORT ──────────────────────────────────────────────────────────
let ontimeChart = null;

function renderTransport() {
  const con = document.getElementById('screen-transport');
  if (!TRANSPORT || !TRANSPORT.routes?.length) {
    con.innerHTML = '<div class="section"><div class="no-data">No transportation data available yet.</div></div>';
    return;
  }

  let html = '';
  TRANSPORT.routes.forEach(route => {
    // Top metrics
    html += `<div style="font-size:18px;font-weight:700;color:var(--navy);margin-bottom:20px">${route.label}</div>`;
     html += `<div class="section"><div class="metric-table">
         <div class="metric-lbl">Avg ridership</div>
         <div class="metric-lbl">Days logged</div>
         <div class="metric-lbl">Handoffs confirmed same day</div>
         <div class="metric-val-t">${route.avgRidership ?? '—'} <span style="font-size:13px;font-weight:500;color:var(--muted)">of ${route.manifestSize ?? '—'}</span></div>
         <div class="metric-val-t">${route.daysLogged ?? '—'}%</div>
         <div class="metric-val-t">${route.handoffsConfirmed ?? '—'}%</div>
       </div></div>`;
     html += `<div class="section">
       <div class="section-title">Morning · TNS → Edgewood</div>
       <div class="metric-table">
         <div class="metric-lbl">On-time departure</div>
         <div class="metric-lbl">Median trip time</div>
         <div class="metric-lbl">90% of trips under</div>
         <div class="metric-val-t">${route.am?.onTime ?? '—'}%</div>
         <div class="metric-val-t">${route.am?.median ?? '—'} min</div>
         <div class="metric-val-t">${route.am?.p90 ?? '—'} min</div>
       </div></div>`;
     html += `<div class="section">
       <div class="section-title">Afternoon · Edgewood → TNS</div>
       <div class="metric-table">
         <div class="metric-lbl">On-time departure</div>
         <div class="metric-lbl">Median trip time</div>
         <div class="metric-lbl">90% of trips under</div>
         <div class="metric-val-t">${route.pm?.onTime ?? '—'}%</div>
         <div class="metric-val-t">${route.pm?.median ?? '—'} min</div>
         <div class="metric-val-t">${route.pm?.p90 ?? '—'} min</div>
       </div></div>`;

    // On-time arrival trend chart
    html += `<div class="section">
      <div class="section-title">On-time arrival performance</div>
      <div class="chart-legend">
        <span><span class="chart-swatch" style="background:#2a78d6"></span>Morning</span>
        <span><span class="chart-swatch" style="background:var(--teal)"></span>Afternoon</span>
      </div>
      <div class="chart-wrap"><canvas id="transport-chart"></canvas></div>
    </div>`;

    // Issue log
    const issues = route.issues || [];
    html += `<div class="section">
      <div class="section-title">Recent issue log</div>`;
    if (!issues.length) {
      html += `<div class="no-data">No incidents or delays logged.</div>`;
    } else {
      html += `<table class="issue-table">
        <thead><tr>
          <th style="width:72px">Date</th>
          <th style="width:44px">Trip</th>
          <th style="width:110px">Category</th>
          <th>Notes</th>
          <th style="width:90px">Liaison</th>
        </tr></thead><tbody>`;
      issues.forEach(i => {
        const badgeCls = i.category === 'Delay' ? 'badge-danger' : i.category === 'Coverage' ? 'badge-accent' : 'badge-warn';
        const liaisonCls = i.liaisonConfirmed === 'yes' ? 'style="color:var(--teal);font-weight:500"' : 'style="color:var(--muted)"';
        const liaisonTxt = i.liaisonConfirmed === 'yes' ? 'Confirmed' : 'Pending';
        html += `<tr>
          <td>${i.date}</td>
          <td>${i.leg?.toUpperCase()}</td>
          <td><span class="badge ${badgeCls}">${i.category}</span></td>
          <td class="td-trunc">${i.notes}</td>
          <td ${liaisonCls}>${liaisonTxt}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
    }
    html += `</div>`;
  });

  con.innerHTML = html;

  // Render Chart.js line chart
  const chartEl = document.getElementById('transport-chart');
  if (chartEl && TRANSPORT.routes?.[0]?.weeklyTrend) {
    if (ontimeChart) { ontimeChart.destroy(); ontimeChart = null; }
    const wt = TRANSPORT.routes[0].weeklyTrend;
    ontimeChart = new Chart(chartEl, {
      type: 'line',
      data: {
        labels: wt.labels,
        datasets: [
          { label:'Morning', data: wt.am, borderColor:'#2a78d6', backgroundColor:'#2a78d6', tension:0.3, pointRadius:4 },
          { label:'Afternoon', data: wt.pm, borderColor:'var(--teal)', backgroundColor:'var(--teal)', tension:0.3, pointRadius:4 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min:70, max:100, ticks:{ callback: v => v+'%' }, grid:{ color:'#e2e8f0' } },
          x: { grid:{ display: false } }
        }
      }
    });
  } else if (chartEl) {
    // Static placeholder until weekly bucketing is built in Apps Script
    ontimeChart = new Chart(chartEl, {
      type: 'line',
      data: {
        labels: ['Week 1','Week 2','Week 3','Week 4'],
        datasets: [
          { label:'Morning', data:[84,88,92,89], borderColor:'#2a78d6', backgroundColor:'#2a78d6', tension:0.3, pointRadius:4 },
          { label:'Afternoon', data:[90,92,94,93], borderColor:'#0d9488', backgroundColor:'#0d9488', tension:0.3, pointRadius:4 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend:{ display:false } },
        scales: {
          y: { min:70, max:100, ticks:{ callback: v => v+'%' }, grid:{ color:'#e2e8f0' } },
          x: { grid:{ display:false } }
        }
      }
    });
  }
}

loadAll();
</script>
